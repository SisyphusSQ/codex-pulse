version: "3"

includes:
  common: ../Taskfile.yml

tasks:
  build:
    summary: 在 macOS 上构建 arm64 应用二进制
    deps:
      - task: common:go:mod:tidy
      - task: common:build:frontend
        vars:
          DEV: '{{.DEV}}'
    preconditions:
      - sh: test "$CODEX_PULSE_ARCH" = arm64
        msg: Codex Pulse v0.1 只支持 macOS arm64
    cmds:
      - mkdir -p "bin"
      - go build {{.BUILD_FLAGS}} -o "bin/codex-pulse"
    vars:
      BUILD_FLAGS: '{{if eq .DEV "true"}}-buildvcs=false -gcflags=all="-l"{{else}}-tags production -trimpath -buildvcs=false -ldflags="-w -s"{{end}}'
    env:
      GOOS: darwin
      GOARCH: '{{.ARCH | default "arm64"}}'
      CGO_ENABLED: 1
      CGO_CFLAGS: -mmacosx-version-min=15.0
      CGO_LDFLAGS: -mmacosx-version-min=15.0
      MACOSX_DEPLOYMENT_TARGET: "15.0"
      CODEX_PULSE_ARCH: '{{.ARCH | default "arm64"}}'

  run:
    summary: 直接运行 macOS arm64 开发二进制
    preconditions:
      - sh: test -x "bin/codex-pulse"
        msg: 未找到开发二进制，请先执行 wails3 build DEV=true ARCH=arm64
    cmds:
      - '"bin/codex-pulse"'

  package:
    summary: 构建、ad-hoc 签名并归档 macOS 15+ arm64 应用
    preconditions:
      - sh: test "{{OS}}" = darwin
        msg: Codex Pulse v0.1 只支持在 macOS 上打包
    cmds:
      - task: package:validate
        vars:
          ARCH: '{{.ARCH | default "arm64"}}'
          APP_VERSION: '{{.APP_VERSION | default "0.0.0"}}'
          BUILD_NUMBER: '{{.BUILD_NUMBER | default "0"}}'
      - task: package:clean
      - task: build
        vars:
          ARCH: arm64
          DEV: "false"
      - task: package:icon
      - task: package:assemble
        vars:
          APP_VERSION: '{{.APP_VERSION | default "0.0.0"}}'
          BUILD_NUMBER: '{{.BUILD_NUMBER | default "0"}}'
      - task: package:sign
      - task: package:verify:bundle
        vars:
          APP_VERSION: '{{.APP_VERSION | default "0.0.0"}}'
          BUILD_NUMBER: '{{.BUILD_NUMBER | default "0"}}'
      - task: package:archive
        vars:
          APP_VERSION: '{{.APP_VERSION | default "0.0.0"}}'
          BUILD_NUMBER: '{{.BUILD_NUMBER | default "0"}}'

  package:validate:
    summary: 在产生任何构建输出前校验 package 输入
    internal: true
    cmds:
      - >-
        build/darwin/validate_package_inputs.sh
        "$CODEX_PULSE_ARCH"
        "$CODEX_PULSE_APP_VERSION"
        "$CODEX_PULSE_BUILD_NUMBER"
    env:
      CODEX_PULSE_ARCH: '{{.ARCH | default "arm64"}}'
      CODEX_PULSE_APP_VERSION: '{{.APP_VERSION | default "0.0.0"}}'
      CODEX_PULSE_BUILD_NUMBER: '{{.BUILD_NUMBER | default "0"}}'

  package:icon:
    summary: 从冻结的正式 PNG 资产生成 macOS icns
    internal: true
    cmds:
      - mkdir -p "bin/.packaging"
      - >-
        build/darwin/generate_icns.sh
        docs/design/front/assets/icons
        "bin/.packaging/icons.icns"

  package:assemble:
    summary: 装配 macOS app bundle 并注入版本元数据
    internal: true
    cmds:
      - >-
        build/darwin/assemble_bundle.sh
        "bin/codex-pulse"
        "bin/.packaging/icons.icns"
        build/darwin/Info.plist
        "bin/Codex Pulse.app"
        "$CODEX_PULSE_APP_VERSION"
        "$CODEX_PULSE_BUILD_NUMBER"
    env:
      CODEX_PULSE_APP_VERSION: '{{.APP_VERSION | default "0.0.0"}}'
      CODEX_PULSE_BUILD_NUMBER: '{{.BUILD_NUMBER | default "0"}}'

  package:sign:
    summary: 对 app bundle 执行 ad-hoc 签名
    internal: true
    preconditions:
      - sh: test -d "bin/Codex Pulse.app"
        msg: 未找到待签名 bundle，请先执行 package:assemble
    cmds:
      - codesign --force --deep --sign - --timestamp=none "bin/Codex Pulse.app"

  package:verify:bundle:
    summary: 验证 bundle 元数据、arm64/minOS、图标与 ad-hoc 签名
    internal: true
    cmds:
      - >-
        build/darwin/verify_bundle.sh
        "bin/Codex Pulse.app"
        "com.sisyphussq.codexpulse"
        "$CODEX_PULSE_APP_VERSION"
        "$CODEX_PULSE_BUILD_NUMBER"
        "15.0.0"
    env:
      CODEX_PULSE_APP_VERSION: '{{.APP_VERSION | default "0.0.0"}}'
      CODEX_PULSE_BUILD_NUMBER: '{{.BUILD_NUMBER | default "0"}}'

  package:verify:
    summary: 验证 bundle 与单顶层 ZIP
    cmds:
      - task: package:verify:bundle
        vars:
          APP_VERSION: '{{.APP_VERSION | default "0.0.0"}}'
          BUILD_NUMBER: '{{.BUILD_NUMBER | default "0"}}'
      - >-
        build/darwin/verify_bundle.sh
        "bin/Codex Pulse.app"
        "com.sisyphussq.codexpulse"
        "$CODEX_PULSE_APP_VERSION"
        "$CODEX_PULSE_BUILD_NUMBER"
        "15.0.0"
        "bin/Codex Pulse.app.zip"
    env:
      CODEX_PULSE_APP_VERSION: '{{.APP_VERSION | default "0.0.0"}}'
      CODEX_PULSE_BUILD_NUMBER: '{{.BUILD_NUMBER | default "0"}}'

  package:archive:
    summary: 生成并验证只有一个顶层 app 的 ZIP
    preconditions:
      - sh: test -d "bin/Codex Pulse.app"
        msg: 未找到已签名 bundle，请先执行 wails3 package GOOS=darwin
    cmds:
      - task: package:verify:bundle
        vars:
          APP_VERSION: '{{.APP_VERSION | default "0.0.0"}}'
          BUILD_NUMBER: '{{.BUILD_NUMBER | default "0"}}'
      - rm -f "bin/Codex Pulse.app.zip"
      - DITTONORSRC=1 ditto -c -k --keepParent "bin/Codex Pulse.app" "bin/Codex Pulse.app.zip"
      - >-
        build/darwin/verify_bundle.sh
        "bin/Codex Pulse.app"
        "com.sisyphussq.codexpulse"
        "$CODEX_PULSE_APP_VERSION"
        "$CODEX_PULSE_BUILD_NUMBER"
        "15.0.0"
        "bin/Codex Pulse.app.zip"
    env:
      CODEX_PULSE_APP_VERSION: '{{.APP_VERSION | default "0.0.0"}}'
      CODEX_PULSE_BUILD_NUMBER: '{{.BUILD_NUMBER | default "0"}}'

  package:clean:
    summary: 删除 bundle、ZIP 与临时图标产物
    cmds:
      - rm -rf "bin/Codex Pulse.app" "bin/Codex Pulse.app.zip" "bin/.packaging"
