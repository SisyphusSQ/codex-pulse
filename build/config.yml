version: "3"

info:
  companyName: SisyphusSQ
  productName: Codex Pulse
  productIdentifier: com.sisyphussq.codexpulse
  description: Local-first Codex usage and quota desktop companion
  copyright: Copyright 2026 SisyphusSQ
  comments: Unreleased development build
  version: 0.0.0

dev_mode:
  root_path: .
  log_level: warn
  debounce: 1000
  ignore:
    dir:
      - .git
      - node_modules
      - frontend
      - bin
      - tmp
    file:
      - .DS_Store
      - .gitignore
      - .gitkeep
      - "*_test.go"
    watched_extension:
      - "*.go"
      - "*.js"
      - "*.ts"
    git_ignore: true
  executes:
    - cmd: wails3 build DEV=true ARCH=arm64
      type: blocking
    - cmd: wails3 task common:dev:frontend
      type: background
    - cmd: wails3 task run
      type: primary

fileAssociations: []
