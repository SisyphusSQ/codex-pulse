version: "3"

tasks:
  go:mod:tidy:
    summary: 整理 Go module
    internal: true
    run: once
    cmds:
      - go mod tidy

  install:frontend:deps:
    summary: 按 lockfile 安装前端依赖
    run: once
    dir: frontend
    sources:
      - package.json
      - package-lock.json
    status:
      - test -d node_modules
    preconditions:
      - sh: npm --version
        msg: 需要 Node.js 与 npm 才能安装前端依赖
    cmds:
      - npm ci

  generate:bindings:
    summary: 从 Go service 生成 TypeScript bindings
    run: once
    deps:
      - task: go:mod:tidy
    sources:
      - "**/*.go"
      - exclude: frontend/**/*
      - go.mod
      - go.sum
    generates:
      - frontend/bindings/**/*
    cmds:
      - wails3 generate bindings -clean=true -ts -i

  build:frontend:
    summary: 构建 Vue 前端
    run: once
    deps:
      - task: install:frontend:deps
      - task: generate:bindings
    dir: frontend
    cmds:
      - npm run {{if eq .DEV "true"}}build:dev{{else}}build{{end}}

  dev:frontend:
    summary: 启动 Vite 开发服务器
    deps:
      - task: install:frontend:deps
    dir: frontend
    cmds:
      - npm run dev -- --port {{.VITE_PORT}} --strictPort
