version: "3"

tasks:
  generate:
    summary: 重生成 Core RPC Go stub
    cmds:
      - make generate-proto

  test:
    summary: 运行 Go race test 与 vet
    cmds:
      - make verify-go

  build:
    summary: 构建 Go Helper 到 bin/codex-pulse
    cmds:
      - make verify-helper

  verify:
    summary: 运行 Helper 完整本地验证
    cmds:
      - make verify
