<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">Codex Pulse app icon - Mono</title>
  <desc id="desc">The monochrome appearance of the Codex Pulse local core and pulse orbit.</desc>
  <defs>
    <linearGradient id="bg" x1="128" y1="96" x2="896" y2="928" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#12141A"/>
      <stop offset="1" stop-color="#30323A"/>
    </linearGradient>
    <linearGradient id="mark" x1="192" y1="240" x2="834" y2="812" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FAFAFB"/>
