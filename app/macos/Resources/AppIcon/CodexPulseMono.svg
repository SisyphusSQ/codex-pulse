    <circle cx="512" cy="512" r="112" fill="#0B0C10" fill-opacity="0.78" stroke="#FFFFFF" stroke-opacity="0.24" stroke-width="12"/>
    <circle cx="512" cy="512" r="62" fill="#F8F8F9"/>
    <circle cx="286" cy="321" r="27" fill="#FFFFFF"/>
